<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Checklist</title>
  <style>
    /* Clean, modern styling */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      display: flex;
      justify-content: center;
      padding-top: 60px;
      margin: 0;
      color: #333;
    }

    .container {
      background: #ffffff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 450px;
    }

    h2 {
      margin-top: 0;
      text-align: center;
      color: #2c3e50;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #007bff;
    }

    button {
      padding: 12px 18px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }

    button:hover {
      background: #0056b3;
    }

    ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #f9f9f9;
      border-radius: 6px;
      margin-bottom: 10px;
      border: 1px solid #eee;
    }

    .task-text {
      flex: 1;
      margin-right: 15px;
      word-break: break-word;
      font-size: 16px;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .actions button {
      padding: 6px 10px;
      font-size: 13px;
      border-radius: 4px;
    }

    .edit-btn {
      background: #f39c12;
    }

    .edit-btn:hover {
      background: #d68910;
    }

    .delete-btn {
      background: #e74c3c;
    }

    .delete-btn:hover {
      background: #c0392b;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>My Checklist</h2>
    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Add a new task or plan...">
      <button onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
  </div>

  <script>
    // Load tasks from local storage when the page loads
    document.addEventListener('DOMContentLoaded', loadTasks);

    // Function to save the current list to the browser's memory
    function saveTasks() {
      const tasks = [];
      // Find all the task text elements and push their content to an array
      document.querySelectorAll('.task-text').forEach(span => {
        tasks.push(span.textContent);
      });
      // Convert the array to a string and save it
      localStorage.setItem('myChecklist', JSON.stringify(tasks));
    }

    // Function to retrieve tasks from the browser's memory
    function loadTasks() {
      const savedData = localStorage.getItem('myChecklist');
      if (savedData) {
        const tasks = JSON.parse(savedData);
        tasks.forEach(taskText => createTaskElement(taskText));
      }
    }

    // Function called by the Add button
    function addTask() {
      const input = document.getElementById('taskInput');
      const taskText = input.value.trim();
      
      if (taskText === '') return;

      createTaskElement(taskText);
      saveTasks(); // Save immediately after adding
      
      input.value = '';
    }

    // Helper function that builds the HTML for a single task
    function createTaskElement(taskText) {
      const li = document.createElement('li');

      const span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = taskText;

      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'actions';

      const editBtn = document.createElement('button');
      editBtn.className = 'edit-btn';
      editBtn.textContent = 'Edit';
      editBtn.onclick = () => {
        editTask(span);
        saveTasks(); // Save after editing
      };

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn';
      deleteBtn.textContent = 'Done';
      deleteBtn.onclick = () => {
        li.remove();
        saveTasks(); // Save after deleting
      };

      actionsDiv.appendChild(editBtn);
      actionsDiv.appendChild(deleteBtn);

      li.appendChild(span);
      li.appendChild(actionsDiv);

      document.getElementById('taskList').appendChild(li);
    }

    // Function to prompt the user for edits
    function editTask(spanElement) {
      const currentText = spanElement.textContent;
      const newText = prompt('Edit your task/plan:', currentText);
      
      if (newText !== null && newText.trim() !== '') {
        spanElement.textContent = newText.trim();
      }
    }

    // Allow pressing "Enter" on the keyboard to add a task
    document.getElementById('taskInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        addTask();
      }
    });
  </script>

</body>
</html>
